apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - gateway_route_policy.yaml

namespace: wormhole-dev

patches:
  - target:
      kind: Deployment
      name: ocr
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: asia-east1-docker.pkg.dev/wormhole-proj-id/virtual/wormhole-ocr:0.1.0
  - target:
      kind: Service
      name: ocr
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: 1
  - target:
      kind: Gateway
      name: ocr
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: 2
      - op: add
        path: /spec/listeners/0/hostname
        value: ocr.dev.wormhole
  - target:
      kind: HTTPRoute
      name: ocr
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: 2
  - target:
      kind: HealthCheckPolicy
      name: ocr
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: 2
  - target:
      kind: GCPBackendPolicy
      name: ocr
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: 2
      - op: add
        path: /spec/default/securityPolicy
        value: wormhole-backend-asia-east1-internal
  - target:
      kind: HorizontalPodAutoscaler
      name: ocr
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: 3
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 4
      - op: add
        path: /spec/metrics/1
        value:
          type: Object
          object:
            describedObject:
              kind: Service
              name: ocr
            metric:
              name: "autoscaling.googleapis.com|gclb-capacity-fullness"
            target:
              averageValue: 20
              type: AverageValue