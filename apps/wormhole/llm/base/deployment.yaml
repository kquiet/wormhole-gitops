apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm
spec:
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
      annotations:
        instrumentation.opentelemetry.io/inject-python: "opentelemetry/wormhole"
        instrumentation.opentelemetry.io/python-container-names: "llm"
    spec:
      containers:
        - name: llm
          image: asia-east1-docker.pkg.dev/wormhole-proj-id/virtual/wormhole-llm:0.1.0
          env:
          - name: AZURE_OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: llm-azure-openai
                key: AZURE_OPENAI_API_KEY
          - name: AZURE_OPENAI_ENDPOINT
            value: https://wormhole-dev.openai.azure.com/
          - name: AZURE_OPENAI_API_VERSION
            value: "2024-02-01"
          - name: AZURE_GPT4O_DEPLOYMENT
            value: gpt-4o
          - name: AZURE_GPT4O_MINI_DEPLOYMENT
            value: gpt-4o-mini
          ports:
            - containerPort: 5003
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /livez
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /livez
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 12
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: cloud.google.com/gke-provisioning
                operator: In
                values:
                - spot
            weight: 50
          - preference:
              matchExpressions:
              - key: nvidia.com/gpu
                operator: DoesNotExist
            weight: 100
      tolerations:
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule