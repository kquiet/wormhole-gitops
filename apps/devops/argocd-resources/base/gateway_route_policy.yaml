apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argocd-server
  annotations:
    cert-manager.io/cluster-issuer: wormhole-cloud-dns-letsencrypt-production
    cert-manager.io/duration: 2160h #90 days
    cert-manager.io/renew-before: 360h #15 days
spec:
  gatewayClassName: gke-l7-regional-external-managed
  listeners:
  - name: http
    protocol: HTTP
    port: 80
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "argocd.kquiet.org"
    tls:
      mode: Terminate
      certificateRefs:
      - group: ""
        kind: Secret
        name: argocd-public-zoo-com-tls
  addresses:
  - type: NamedAddress
    value: wormhole-argocdip
---
apiVersion: networking.gke.io/v1
kind: GCPGatewayPolicy
metadata:
  name: argocd-server
spec:
  default:
    sslPolicy: devops-ssl-asia-east1
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: argocd-server
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server-redirect-http
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: argocd-server
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: argocd-server
    sectionName: https
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: argocd-server
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: argocd-server
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /healthz
  targetRef:
    group: ""
    kind: Service
    name: argocd-server
---
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: argocd-server
spec:
  default:
    balancingMode: RATE
    capacityScalerPercent: 100
    connectionDraining:
      drainingTimeoutSec: 0
    logging:
      enabled: true
      optionalMode: INCLUDE_ALL_OPTIONAL
      sampleRate: 1e6
    maxRatePerEndpoint: 100
    securityPolicy: devops-backend-asia-east1
    sessionAffinity:
      type: NONE
    timeoutSec: 30
  targetRef:
    group: ""
    kind: Service
    name: argocd-server